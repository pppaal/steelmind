services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_TOKEN: ${API_TOKEN:-}
      SENSOR_HZ: ${SENSOR_HZ:-20}
      JOURNAL_DB: /data/steelmind.db
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    env_file:
      # Optional .env at repo root — silently ignored if missing.
      - path: ./.env
        required: false
    volumes:
      - journal:/data
    ports:
      - "8000:8000"
    # k8s-style probes: /readyz flips to 503 the moment shutdown begins so
    # the compose / orchestrator can drain before stopping the container.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/readyz', timeout=2); sys.exit(0 if r.status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    stop_grace_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    env_file:
      - path: ./.env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    stop_grace_period: 15s
    restart: unless-stopped

  # Observability stack — opt-in: `docker compose --profile monitoring up`.
  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  journal:
