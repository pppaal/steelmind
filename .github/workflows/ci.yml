name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check .
      - name: pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - name: build
        run: npx next build
        env:
          NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws

  integration:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Launch backend
        run: uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
        env:
          JOURNAL_DB: ${{ runner.temp }}/steelmind-ci.db
      - name: Wait for /health
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "backend did not become healthy" && exit 1
      - name: Drive a command and inspect state
        run: |
          curl -sf -X POST http://127.0.0.1:8000/command \
            -H 'Content-Type: application/json' \
            -d '{"command":"stand"}' | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']['state']=='STANDING', d"
      - name: Verify journal recorded the transition
        run: |
          curl -sf 'http://127.0.0.1:8000/journal/counts' | python -c "import sys,json; d=json.load(sys.stdin); assert d['transitions']>=1, d"
      - name: Scrape metrics
        run: |
          curl -sf http://127.0.0.1:8000/metrics | grep -E '^steelmind_transitions_total [0-9]+'

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: steelmind-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: steelmind-frontend:ci
